<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>農作物辨識 - 山城 AI 智慧旅伴</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --eco-green: #28a745; }
    
    /* 模擬全螢幕相機畫面 (使用茶葉圖片當假背景) */
    body, html { height: 100%; margin: 0; background-color: #000; overflow: hidden; font-family: sans-serif;}
    .camera-view {
      height: 100%;
      background: url('https://images.unsplash.com/photo-1596522513926-218080fdbf38?q=80&w=800&auto=format&fit=crop') center center / cover no-repeat;
      position: relative;
    }

    /* 頂部透明導覽 */
    .top-transparent { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; z-index: 10; }
    .btn-close-camera { color: white; font-size: 1.5rem; text-decoration: none; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
    
    /* 掃描對焦框 */
    .focus-frame {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      width: 250px; height: 250px;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 20px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4); /* 讓框外變暗 */
      overflow: hidden;
    }

    /* 掃描雷射線動畫 */
    .laser-line {
      width: 100%; height: 3px;
      background-color: #00ff41;
      box-shadow: 0 0 10px #00ff41;
      position: absolute;
      animation: scan 2s infinite ease-in-out;
    }
    @keyframes scan {
      0% { top: 0; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* 底部拍照按鈕區 */
    .camera-controls {
      position: absolute; bottom: 40px; width: 100%;
      display: flex; justify-content: center; align-items: center; z-index: 10;
    }
    .capture-btn {
      width: 70px; height: 70px;
      border-radius: 50%;
      background-color: transparent;
      border: 4px solid white;
      position: relative;
      cursor: pointer;
    }
    .capture-btn::after {
      content: ''; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 54px; height: 54px;
      background-color: white; border-radius: 50%;
      transition: background-color 0.2s;
    }
    .capture-btn:active::after { background-color: #ddd; }

    /* 模擬辨識結果卡片 (Bottom Sheet) */
    .result-sheet {
      position: absolute; bottom: -100%; left: 0; width: 100%;
      background-color: white; border-radius: 24px 24px 0 0;
      padding: 30px 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
      transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 20;
    }
    /* 加上這個 class 就會滑出來 */
    .result-sheet.show { bottom: 0; } 
    
    .sheet-handle { width: 40px; height: 5px; background-color: #ccc; border-radius: 5px; margin: 0 auto 20px auto; }
  </style>
</head>
<body>

  <div class="camera-view">
    <div class="top-transparent">
      <a href="index.html" class="btn-close-camera">✕</a>
      <span class="text-white text-shadow">請將農作物置於框內</span>
      <div style="width: 24px;"></div> </div>

    <div class="focus-frame">
      <div class="laser-line"></div>
    </div>

    <div class="camera-controls">
      <div class="capture-btn" onclick="showResult()"></div>
    </div>

    <div class="result-sheet" id="resultCard">
      <div class="sheet-handle"></div>
      <div class="d-flex align-items-center mb-3">
        <div class="bg-success text-white rounded p-2 me-3 fs-3">🍃</div>
        <div>
          <span class="badge bg-success mb-1">辨識成功：準確率 98%</span>
          <h4 class="fw-bold mb-0">杉林溪高山烏龍茶</h4>
        </div>
      </div>
      <p class="text-muted small">特徵：一心二葉，葉片厚實柔軟。生長於海拔 1600 公尺以上，日夜溫差大，造就獨特冷香。</p>
      
      <div class="d-flex gap-2 mt-4">
        <button class="btn btn-outline-success flex-grow-1 fw-bold">📖 食農小知識</button>
        <button class="btn btn-success flex-grow-1 fw-bold">🏅 領取集章</button>
      </div>
    </div>
  </div>

  <script>
    // 簡單的 JS 互動：點擊拍照按鈕後，顯示辨識結果卡片
    function showResult() {
      // 隱藏雷射動畫
      document.querySelector('.laser-line').style.display = 'none';
      // 顯示結果卡片
      document.getElementById('resultCard').classList.add('show');
    }
  </script>
</body>
</html>
