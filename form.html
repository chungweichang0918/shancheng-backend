<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>規劃專屬行程 - 山城 AI 智慧旅伴</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --eco-green: #28a745; }
    body { background-color: #f8f9fa; padding-bottom: 90px; }
    
    /* 頂部導覽 */
    .top-bar { background-color: white; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 10; display: flex; align-items: center;}
    .back-btn { font-size: 1.2rem; text-decoration: none; color: #333; margin-right: 15px; }
    
    /* 客製化選項按鈕 (利用 Bootstrap 的 btn-check) */
    .btn-outline-custom {
      color: #555;
      border: 2px solid #e9ecef;
      border-radius: 12px;
      font-weight: bold;
      padding: 12px 15px;
      text-align: left;
      transition: all 0.2s;
      background-color: white;
    }
    .btn-check:checked + .btn-outline-custom {
      background-color: #eafaf1; /* 淡淡的綠色背景 */
      border-color: var(--eco-green);
      color: var(--eco-green);
      box-shadow: 0 4px 10px rgba(40, 167, 69, 0.15);
    }
    .btn-check:checked + .btn-outline-custom .icon { transform: scale(1.1); }
    .icon { font-size: 1.5rem; display: block; margin-bottom: 8px; transition: transform 0.2s;}
    
    /* 懸浮的送出按鈕 */
    .floating-bottom { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 20px; background: linear-gradient(to top, white 80%, rgba(255,255,255,0)); z-index: 100; }
    .btn-generate { background-color: var(--eco-green); color: white; font-weight: bold; padding: 15px; border-radius: 50px; box-shadow: 0 4px 15px rgba(40,167,69,0.3); font-size: 1.1rem;}
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="index.html" class="back-btn">←</a>
    <h5 class="mb-0 fw-bold">告訴我們您的旅行期待</h5>
  </div>

  <div class="container mt-4">
    <form>
      <div class="mb-4">
        <h6 class="fw-bold mb-3 text-secondary">1. 誰與您同行？</h6>
        <div class="row g-2">
          <div class="col-4">
            <input type="radio" class="btn-check" name="audience" id="aud-family" autocomplete="off" checked>
            <label class="btn btn-outline-custom w-100" for="aud-family"><span class="icon">👨‍👩‍👧</span>親子</label>
          </div>
          <div class="col-4">
            <input type="radio" class="btn-check" name="audience" id="aud-couple" autocomplete="off">
            <label class="btn btn-outline-custom w-100" for="aud-couple"><span class="icon">👩‍❤️‍👨</span>情侶</label>
          </div>
          <div class="col-4">
            <input type="radio" class="btn-check" name="audience" id="aud-senior" autocomplete="off">
            <label class="btn btn-outline-custom w-100" for="aud-senior"><span class="icon">🧓</span>銀髮族</label>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h6 class="fw-bold mb-3 text-secondary">2. 預計停留時間？</h6>
        <div class="row g-2">
          <div class="col-6">
            <input type="radio" class="btn-check" name="duration" id="dur-half" autocomplete="off">
            <label class="btn btn-outline-custom w-100" for="dur-half"><span class="icon">🌤️</span>半日遊</label>
          </div>
          <div class="col-6">
            <input type="radio" class="btn-check" name="duration" id="dur-full" autocomplete="off" checked>
            <label class="btn btn-outline-custom w-100" for="dur-full"><span class="icon">☀️</span>一日遊</label>
          </div>
        </div>
      </div>

      <div class="mb-4">
        <h6 class="fw-bold mb-3 text-secondary">3. 您感興趣的主題？(可複選)</h6>
        <div class="row g-2">
          <div class="col-4">
            <input type="checkbox" class="btn-check" id="pref-eco" autocomplete="off">
            <label class="btn btn-outline-custom w-100" for="pref-eco"><span class="icon">🌿</span>生態探索</label>
          </div>
          <div class="col-4">
            <input type="checkbox" class="btn-check" id="pref-food" autocomplete="off">
            <label class="btn btn-outline-custom w-100" for="pref-food"><span class="icon">🍲</span>美食旅遊</label>
          </div>
          <div class="col-4">
            <input type="checkbox" class="btn-check" id="pref-photo" autocomplete="off">
            <label class="btn btn-outline-custom w-100" for="pref-photo"><span class="icon">📷</span>攝影景點</label>
          </div>
        </div>
      </div>
    </form>
  </div>

  <div class="floating-bottom">
    <button class="btn btn-generate w-100">✨ AI 開始規劃專屬行程</button>
  </div>

</body>
</html>
